<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS&R Bill — Tiered Offering</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0D1117;
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    color: #E8EDF2;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0D1117 0%, #141C2B 100%);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 32px 48px 28px;
  }
  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    max-width: 1300px;
    margin: 0 auto;
  }
  .header-eyebrow {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.18em;
    color: #006D77;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: #fff;
  }
  .header-sub {
    font-size: 14px;
    color: #7A8899;
    margin-top: 6px;
  }
  .header-meta {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .header-meta-item { text-align: right; }
  .header-meta-item .label {
    font-size: 10px;
    color: #5A6878;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .header-meta-item .val {
    font-size: 13px;
    font-weight: 600;
    color: #E0E8F0;
    margin-top: 2px;
  }

  /* ── Layout ── */
  .main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 32px 48px 64px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 28px;
  }

  /* ── Left nav ── */
  .nav-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.14em;
    color: #4A5568;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-left: 4px;
  }
  .tier-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    text-align: left;
    margin-bottom: 6px;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
  }
  .tier-btn:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.12); }
  .tier-btn.active { transform: none; }
  .tier-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: #5A6878;
    flex-shrink: 0;
    transition: all 0.25s;
  }
  .tier-btn.active .tier-icon { color: #fff; }
  .tier-btn-name {
    font-size: 13px;
    font-weight: 600;
    color: #8A9BAD;
    line-height: 1.3;
    transition: color 0.2s;
  }
  .tier-btn.active .tier-btn-name { color: #fff; }
  .tier-btn-dur {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
    color: #4A5568;
    transition: color 0.2s;
  }

  /* Pipeline widget */
  .pipeline-widget {
    margin-top: 28px;
    padding: 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
  }
  .pipeline-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.12em;
    color: #4A5568;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .pip-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .pip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .pip-name { font-size: 11.5px; flex: 1; }
  .pip-time { font-size: 10px; font-family: 'DM Mono', monospace; }

  /* ── Detail panel ── */
  .detail { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tier-header {
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .tier-header-num-bg {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 96px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    line-height: 1;
    user-select: none;
    pointer-events: none;
  }
  .tier-header-inner {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    position: relative;
  }
  .tier-big-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }
  .tier-eyebrow {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .tier-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  .tier-summary {
    font-size: 14px;
    color: #8A9BAD;
    line-height: 1.6;
    max-width: 620px;
  }
  .meta-pills {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    position: relative;
  }
  .meta-pill {
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(0,0,0,0.3);
    font-size: 12px;
  }
  .meta-pill .ml { color: #5A6878; }
  .meta-pill .mv { color: #D0DAE8; font-weight: 500; }

  /* Two col grid */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 22px;
  }
  .card-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .activity-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13.5px;
    line-height: 1.5;
    color: #B0BAC8;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-num {
    width: 18px; height: 18px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .deliverable-item {
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    margin-bottom: 8px;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .deliverable-item:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }
  .deliverable-item:last-child { margin-bottom: 0; }
  .del-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .del-name { font-size: 13px; font-weight: 600; color: #D8E4F0; margin-bottom: 2px; }
  .del-desc { font-size: 11.5px; color: #6A7888; line-height: 1.45; }

  .target-bar {
    margin-top: 16px;
    padding: 14px 20px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .target-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .target-divider { width: 1px; height: 24px; }
  .target-text { font-size: 13px; color: #9AAABB; }

  /* Pagination dots */
  .dots { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 28px; }
  .dot {
    height: 8px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.12);
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    padding: 0;
  }
  .dot.active { width: 28px !important; }
  .dot:not(.active) { width: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-eyebrow">Advisory Offering · 2026</div>
      <h1>Cyber Security &amp; Resilience Bill</h1>
      <p class="header-sub">Five-tier readiness &amp; advisory programme</p>
    </div>
    <div class="header-meta">
      <div class="header-meta-item"><div class="label">Introduced</div><div class="val">12 Nov 2025</div></div>
      <div class="header-meta-item"><div class="label">2nd Reading</div><div class="val">6 Jan 2026</div></div>
      <div class="header-meta-item"><div class="label">Royal Assent</div><div class="val">H2 2026 est.</div></div>
    </div>
  </div>
</div>

<div class="main">
  <!-- Left nav -->
  <div>
    <div class="nav-label">Select Tier</div>
    <div id="nav"></div>

    <div class="pipeline-widget">
      <div class="pipeline-label">24/72hr Reporting Pipeline</div>
      <div id="pipeline"></div>
    </div>
  </div>

  <!-- Detail -->
  <div id="detail"></div>
</div>

<script>
const TIERS = [
  {
    number: "01", name: "Scope & Exposure Screen",
    duration: "1–2 weeks", fee: "Fixed fee", effort: "5–8 consultant days",
    color: "#006D77",
    tagline: "Where do you stand?",
    summary: "Rapid regulatory position statement. Determines whether your organisation is directly regulated, at DCS designation risk, or subject to supply chain compliance pressure from regulated clients.",
    activities: [
      "Document review: contracts, client base, geography, size thresholds",
      "Structured leadership & legal/compliance interview",
      "Mapping against OES, RDSP, RMSP, data centre & DCS categories",
      "Indirect supply chain exposure assessment",
      "Preliminary CAF / ISO 27001 alignment review",
    ],
    deliverables: [
      { name: "Scope Determination Report", desc: "Formal regulatory status assessment across all entity categories" },
      { name: "Regulatory Exposure Summary", desc: "One-page visual map of direct vs indirect regulatory pressure" },
      { name: "Competent Authority Mapping", desc: "Relevant regulator identification & 3-month registration timeline" },
      { name: "Recommended Next Steps", desc: "Prioritised recommendation on immediate actions" },
    ],
    target: "Any organisation uncertain of their regulatory status",
  },
  {
    number: "02", name: "CS&R Readiness Assessment",
    duration: "4–6 weeks", fee: "Fixed / T&M", effort: "~30 consultant days",
    color: "#1B2A4A",
    tagline: "Know your gaps.",
    summary: "Full-depth assessment of current compliance posture across all CS&R obligations — governance, technical controls, detection, incident response, and supply chain risk — mapped to the NCSC CAF.",
    activities: [
      "CAF Objective A: Governance, board accountability, risk management, asset inventory",
      "CAF Objective B: IAM, network architecture, vulnerability management, data protection",
      "CAF Objective C: SIEM/SOAR coverage, EDR/NDR deployment, threat intelligence",
      "CAF Objective D: IR plan review, 24/72hr notification pipeline, BCP/DR testing",
      "Supply chain: supplier inventory, tier classification, contractual gap analysis",
    ],
    deliverables: [
      { name: "CS&R Readiness Assessment Report", desc: "Full CAF-mapped findings with maturity scores (1–4 scale)" },
      { name: "Prioritised Gap Register", desc: "RAG-rated gaps with severity, effort, regulatory risk & owner" },
      { name: "12-Month Compliance Roadmap", desc: "Phased remediation: quick wins → tactical → strategic" },
      { name: "Supply Chain Risk Register", desc: "Supplier inventory, tier map & contractual gap analysis" },
      { name: "Board-Ready Executive Summary", desc: "Non-technical 4–6 page brief for board/audit committee" },
    ],
    target: "Confirmed in-scope OES, RDSP, RMSP, data centre or supply chain entities",
  },
  {
    number: "03", name: "Remediation & Control Build",
    duration: "8–16 weeks", fee: "T&M / Retainer", effort: "Scoped per workstream",
    color: "#6D28D9",
    tagline: "Close the gaps.",
    summary: "Modular, hands-on remediation across identified gap areas. Clients engage on specific workstreams — governance, technical controls, detection, or supply chain — rather than a monolithic programme.",
    activities: [
      "Workstream A — Governance & Policy: board reporting, risk appetite, supply chain policy",
      "Workstream B — Technical Controls: IAM uplift, network segmentation, vuln management",
      "Workstream C — Detection & Monitoring: SIEM log gaps, SOC model, threat intel programme",
      "Workstream D — Supply Chain: questionnaire design, contract clauses, DCS risk mitigation",
    ],
    deliverables: [
      { name: "Policy & Procedure Documentation", desc: "Drafted, approved policies version-controlled for ISMS/GRC" },
      { name: "Remediation Evidence Pack", desc: "Control implementation evidence suitable for regulatory inspection" },
      { name: "Sprint Progress Reports", desc: "Bi-weekly gap register updates; blockers and dependencies flagged" },
      { name: "Lessons Learned & Handover Pack", desc: "Runbooks, training notes, knowledge transfer for internal teams" },
    ],
    target: "Organisations with identified gaps requiring targeted uplift",
  },
  {
    number: "04", name: "IR & Reporting Capability Build",
    duration: "6–10 weeks", fee: "Fixed / Retainer", effort: "~25–35 consultant days",
    color: "#B45309",
    tagline: "Can you report in 24 hours?",
    summary: "Builds and validates the full detection-to-notification pipeline. Leveraging specialist DFIR expertise to stress-test 24/72-hour reporting capability end-to-end — the most differentiated tier in the offering.",
    activities: [
      "Phase 1: Pipeline assessment — detection-to-declaration timelines, IR plan review, tabletop",
      "Phase 2: Capability build — IR plan uplift, notification templates, dual-regulator SOPs",
      "Phase 2: Evidence preservation runbook, legal privilege framework, customer notification triggers",
      "Phase 3: Clock-based tabletop — end-to-end 24hr notification scenario with timing analysis",
    ],
    deliverables: [
      { name: "IR Capability Assessment Report", desc: "24/72hr pipeline gap analysis and timeline benchmarking" },
      { name: "Updated IR Plan & Playbooks", desc: "Ransomware, data exfiltration & supply chain compromise playbooks" },
      { name: "Regulatory Notification Templates", desc: "24hr initial + 72hr full report + customer notification templates" },
      { name: "Dual-Notification Process SOP", desc: "Step-by-step concurrent reporting to regulator and NCSC" },
      { name: "Tabletop Exercise Report", desc: "Scenario debrief, gap analysis, timing analysis & recommendations" },
    ],
    target: "All in-scope entities requiring demonstrable 24/72-hour notification capability",
  },
  {
    number: "05", name: "Ongoing Assurance & Advisory",
    duration: "Rolling", fee: "Annual Retainer", effort: "Foundation / Standard / Premium",
    color: "#166534",
    tagline: "Stay ahead as the law evolves.",
    summary: "Named advisory relationship tracking secondary legislation, maintaining compliance posture through regular reviews and exercises, with on-call support for live incidents where notification decisions must be made under time pressure.",
    activities: [
      "Foundation: Monthly regulatory watch + quarterly CAF reviews + quarterly board packs",
      "Standard: Foundation + bi-annual tabletops + supply chain reviews + annual IR plan refresh",
      "Premium: Standard + SLA-backed on-call advisory + incident notification support",
    ],
    deliverables: [
      { name: "Regulatory Watch Briefings", desc: "Monthly: secondary legislation, codes of practice, enforcement actions" },
      { name: "CAF Progress Reviews", desc: "Quarterly: updated maturity scores, new gaps, remediation tracking" },
      { name: "Tabletop Exercises", desc: "Bi-annual simulated 24/72hr notification scenarios" },
      { name: "Board Reporting Packs", desc: "Quarterly executive cyber risk & compliance summary" },
      { name: "On-Call Advisory (Premium)", desc: "SLA-backed named advisor access for incidents & regulatory queries" },
    ],
    target: "Any in-scope organisation seeking sustained compliance confidence",
  },
];

const PIPELINE = [
  { stage: "Detect",    time: "T+0 to T+2h",  color: "#006D77",  hi: false },
  { stage: "Declare",   time: "T+2h to T+4h",  color: "#1B2A4A",  hi: false },
  { stage: "Notify",    time: "T+4h to T+8h",  color: "#6D28D9",  hi: false },
  { stage: "Report",    time: "≤ T+24h",        color: "#B45309",  hi: true  },
  { stage: "Follow-up", time: "≤ T+72h",        color: "#166534",  hi: true  },
];

let active = 0;

function hex(col, alpha) {
  // Return rgba from hex
  const r = parseInt(col.slice(1,3),16);
  const g = parseInt(col.slice(3,5),16);
  const b = parseInt(col.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = TIERS.map((t, i) => `
    <button class="tier-btn${i===active?' active':''}" onclick="setActive(${i})" id="nav-btn-${i}"
      style="${i===active ? `background:linear-gradient(135deg,${hex(t.color,0.13)},${hex(t.color,0.08)});border-color:${hex(t.color,0.33)};box-shadow:0 0 20px ${hex(t.color,0.13)};` : ''}">
      <div class="tier-icon" id="nav-icon-${i}"
        style="${i===active ? `background:${t.color};` : ''}">
        ${t.number}
      </div>
      <div>
        <div class="tier-btn-name" style="${i===active ? 'color:#fff;' : ''}">${t.name}</div>
        <div class="tier-btn-dur" style="${i===active ? `color:${t.color};` : ''}">${t.duration}</div>
      </div>
    </button>
  `).join('');
}

function buildPipeline() {
  document.getElementById('pipeline').innerHTML = PIPELINE.map(p => `
    <div class="pip-row">
      <div class="pip-dot" style="background:${p.hi ? p.color : 'rgba(255,255,255,0.2)'}"></div>
      <div class="pip-name" style="color:${p.hi ? p.color : '#5A6878'};font-weight:${p.hi?600:400}">${p.stage}</div>
      <div class="pip-time" style="color:${p.hi ? p.color : '#3A4858'}">${p.time}</div>
    </div>
  `).join('');
}

function buildDetail() {
  const t = TIERS[active];
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div class="detail">
      <!-- Header card -->
      <div class="tier-header" style="background:linear-gradient(135deg,${hex(t.color,0.1)},${hex(t.color,0.05)});border:1px solid ${hex(t.color,0.19)};">
        <div class="tier-header-num-bg" style="color:${hex(t.color,0.1)}">${t.number}</div>
        <div class="tier-header-inner">
          <div class="tier-big-icon" style="background:${t.color};box-shadow:0 4px 20px ${hex(t.color,0.33)}">
            ${t.number}
          </div>
          <div style="flex:1">
            <div class="tier-eyebrow" style="color:${t.color}">${t.tagline}</div>
            <div class="tier-title">${t.name}</div>
            <div class="tier-summary">${t.summary}</div>
          </div>
        </div>
        <div class="meta-pills">
          <div class="meta-pill" style="border:1px solid ${hex(t.color,0.19)}">
            <span class="ml">Duration: </span><span class="mv">${t.duration}</span>
          </div>
          <div class="meta-pill" style="border:1px solid ${hex(t.color,0.19)}">
            <span class="ml">Fee model: </span><span class="mv">${t.fee}</span>
          </div>
          <div class="meta-pill" style="border:1px solid ${hex(t.color,0.19)}">
            <span class="ml">Effort: </span><span class="mv">${t.effort}</span>
          </div>
        </div>
      </div>

      <!-- Two columns -->
      <div class="two-col">
        <!-- Activities -->
        <div class="card">
          <div class="card-label" style="color:${t.color}">Approach</div>
          ${t.activities.map((a,i) => `
            <div class="activity-item">
              <div class="activity-num" style="background:${hex(t.color,0.13)};border:1px solid ${hex(t.color,0.27)};color:${t.color}">
                ${String(i+1).padStart(2,'0')}
              </div>
              <span>${a}</span>
            </div>
          `).join('')}
        </div>

        <!-- Deliverables -->
        <div class="card">
          <div class="card-label" style="color:${t.color}">Deliverables</div>
          ${t.deliverables.map(d => `
            <div class="deliverable-item">
              <div class="del-dot" style="background:${t.color}"></div>
              <div>
                <div class="del-name">${d.name}</div>
                <div class="del-desc">${d.desc}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Target bar -->
      <div class="target-bar" style="background:${hex(t.color,0.05)};border:1px solid ${hex(t.color,0.15)}">
        <div class="target-label" style="color:${t.color}">Target</div>
        <div class="target-divider" style="background:${hex(t.color,0.19)}"></div>
        <div class="target-text">${t.target}</div>
      </div>

      <!-- Dots -->
      <div class="dots">
        ${TIERS.map((tt,i) => `
          <button class="dot${i===active?' active':''}"
            style="${i===active ? `background:${tt.color};width:28px;` : 'width:8px;'}"
            onclick="setActive(${i})"></button>
        `).join('')}
      </div>
    </div>
  `;
}

function setActive(i) {
  active = i;
  buildNav();
  buildDetail();
}

buildNav();
buildPipeline();
buildDetail();
</script>
</body>
</html>
