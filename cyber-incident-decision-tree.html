<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Incident Decision Tree</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');

:root {
  --bg:#0d0f14; --surface:#13161d; --surface2:#1a1e28; --surface3:#20253200;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
  --text:#e8eaf0; --muted:#7a8099; --dim:#4a506a;
  --c-green:#2ddd96; --c-green-bg:rgba(45,221,150,0.09); --c-green-border:rgba(45,221,150,0.25);
  --c-yellow:#f5c842; --c-yellow-bg:rgba(245,200,66,0.09); --c-yellow-border:rgba(245,200,66,0.25);
  --c-orange:#ff8c42; --c-orange-bg:rgba(255,140,66,0.09); --c-orange-border:rgba(255,140,66,0.25);
  --c-red:#ff4757; --c-red-bg:rgba(255,71,87,0.09); --c-red-border:rgba(255,71,87,0.3);
  --c-purple:#a78bfa; --c-purple-bg:rgba(167,139,250,0.1); --c-purple-border:rgba(167,139,250,0.25);
  --c-blue:#60a5fa; --c-blue-bg:rgba(96,165,250,0.09); --c-blue-border:rgba(96,165,250,0.22);
  --c-gray:#9ca3b0; --c-gray-bg:rgba(156,163,176,0.08); --c-gray-border:rgba(156,163,176,0.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.65;min-height:100vh;}

.shell{display:flex;min-height:100vh;}
.sidebar{width:272px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:24px 18px;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;}
.main{flex:1;padding:36px 44px;max-width:900px;}

.wordmark{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;}
.nav-section-label{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);margin:18px 0 7px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;color:var(--muted);font-size:12px;transition:all 0.15s;border:1px solid transparent;text-decoration:none;background:none;width:100%;text-align:left;font-family:'IBM Plex Mono',monospace;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--surface2);border-color:var(--border2);color:var(--text);}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

.sev{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;}
.sev-0{background:var(--c-green-bg);color:var(--c-green);border:1px solid var(--c-green-border);}
.sev-1{background:var(--c-yellow-bg);color:var(--c-yellow);border:1px solid var(--c-yellow-border);}
.sev-2{background:var(--c-orange-bg);color:var(--c-orange);border:1px solid var(--c-orange-border);}
.sev-3{background:var(--c-red-bg);color:var(--c-red);border:1px solid var(--c-red-border);}
.sev-4{background:var(--c-purple-bg);color:var(--c-purple);border:1px solid var(--c-purple-border);}

.imt-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;background:rgba(96,165,250,0.1);color:var(--c-blue);border:1px solid var(--c-blue-border);margin-left:6px;}
.dfir-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;background:rgba(167,139,250,0.1);color:var(--c-purple);border:1px solid var(--c-purple-border);margin-left:6px;}
.badges-row{display:flex;flex-wrap:wrap;gap:4px;margin:10px 0 18px;align-items:center;}

.progress-bar-wrap{margin-bottom:26px;}
.progress-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:5px;}
.progress-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#2ddd96,#60a5fa);border-radius:2px;transition:width 0.3s ease;}

.timer-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:10px;color:var(--muted);margin-bottom:18px;}
.timer-dot{width:6px;height:6px;border-radius:50%;background:var(--c-green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);cursor:pointer;padding:4px 0;margin-bottom:22px;background:none;border:none;font-family:'IBM Plex Mono',monospace;transition:color 0.12s;}
.back-btn:hover{color:var(--muted);}

.q-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:26px 30px;margin-bottom:22px;animation:slideIn 0.18s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.q-number{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.q-text{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:7px;}
.q-hint{color:var(--muted);font-size:11px;margin-bottom:20px;line-height:1.65;padding:10px 12px;background:var(--bg);border-radius:6px;border-left:2px solid var(--border2);}

.options{display:flex;flex-direction:column;gap:8px;}
.opt-btn{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;text-align:left;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.6;transition:all 0.12s;}
.opt-btn:hover{border-color:var(--border2);transform:translateX(3px);}
.opt-btn.opt-unknown{border-style:dashed;opacity:0.8;}
.opt-btn.opt-unknown:hover{opacity:1;border-color:var(--c-gray-border);}
.opt-key{display:flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:4px;background:var(--bg);border:1px solid var(--border2);font-size:10px;font-weight:500;color:var(--muted);flex-shrink:0;margin-top:2px;}
.opt-content{flex:1;}
.opt-label{color:var(--text);font-weight:500;margin-bottom:2px;}
.opt-desc{color:var(--muted);font-size:11px;line-height:1.5;}
.opt-tag{display:inline;padding:1px 5px;border-radius:3px;font-size:9px;background:var(--c-gray-bg);border:1px solid var(--c-gray-border);color:var(--c-gray);margin-left:6px;letter-spacing:0.05em;text-transform:uppercase;vertical-align:middle;}
.opt-arrow{opacity:0;color:var(--muted);font-size:13px;transition:opacity 0.12s;flex-shrink:0;align-self:center;}
.opt-btn:hover .opt-arrow{opacity:1;}

/* OUTCOME */
.outcome-card{border-radius:10px;padding:26px 30px;border:1px solid;margin-bottom:22px;animation:slideIn 0.18s ease;}
.outcome-0{background:var(--c-green-bg);border-color:var(--c-green-border);}
.outcome-1{background:var(--c-yellow-bg);border-color:var(--c-yellow-border);}
.outcome-2{background:var(--c-orange-bg);border-color:var(--c-orange-border);}
.outcome-3{background:var(--c-red-bg);border-color:var(--c-red-border);}
.outcome-4{background:var(--c-purple-bg);border-color:var(--c-purple-border);}
.outcome-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin:10px 0 7px;}
.outcome-desc{color:var(--muted);font-size:12px;margin-bottom:18px;line-height:1.75;max-width:600px;}

/* ACTION SECTIONS */
.action-section{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:10px;}
.action-section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.action-section-icon{font-size:13px;}
.action-section-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);font-weight:500;}
.action-section-badge{display:inline-flex;padding:2px 7px;border-radius:3px;font-size:9px;text-transform:uppercase;letter-spacing:0.07em;}
.badge-now{background:rgba(255,71,87,0.15);color:var(--c-red);border:1px solid rgba(255,71,87,0.25);}
.badge-soon{background:rgba(245,200,66,0.12);color:var(--c-yellow);border:1px solid rgba(245,200,66,0.22);}
.badge-parallel{background:rgba(96,165,250,0.1);color:var(--c-blue);border:1px solid var(--c-blue-border);}

.action-list{list-style:none;}
.action-list li{display:flex;align-items:flex-start;gap:8px;padding:5px 0;color:var(--muted);font-size:11px;line-height:1.55;}
.action-list li::before{content:'→';color:var(--dim);flex-shrink:0;margin-top:0;}
.action-list li strong{color:var(--text);font-weight:500;}
.action-list.dense li{padding:3px 0;}

/* STEPS GRID — 2 col for immediate, stacked for rest */
.steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.steps-grid-wide{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:10px;}

/* TRIGGER CALLOUT */
.trigger-callout{border-radius:8px;padding:14px 18px;border:1px solid;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
.trigger-imt{background:var(--c-blue-bg);border-color:var(--c-blue-border);}
.trigger-dfir{background:var(--c-purple-bg);border-color:var(--c-purple-border);}
.trigger-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
.trigger-content{}
.trigger-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;margin-bottom:4px;}
.trigger-imt .trigger-label{color:var(--c-blue);}
.trigger-dfir .trigger-label{color:var(--c-purple);}
.trigger-text{font-size:11px;color:var(--muted);line-height:1.6;}

/* ESCALATION ROW */
.esc-row{display:flex;flex-wrap:wrap;gap:6px;padding-top:14px;border-top:1px solid var(--border);margin-top:6px;align-items:center;}
.esc-label{font-size:10px;letter-spacing:0.09em;text-transform:uppercase;color:var(--dim);margin-right:4px;}
.esc-pill{padding:3px 9px;border-radius:4px;font-size:10px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);}
.esc-pill.esc-urgent{background:rgba(255,71,87,0.1);border-color:rgba(255,71,87,0.25);color:var(--c-red);}
.esc-pill.esc-high{background:rgba(255,140,66,0.1);border-color:rgba(255,140,66,0.25);color:var(--c-orange);}
.esc-pill.esc-info{background:var(--c-blue-bg);border-color:var(--c-blue-border);color:var(--c-blue);}

/* DECISION LOG */
.decision-log{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:20px;}
.decision-log-title{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.log-entry{display:flex;gap:10px;padding:4px 0 4px 10px;font-size:11px;color:var(--muted);border-left:2px solid var(--border);margin-left:4px;line-height:1.5;}
.log-entry:not(:last-child){margin-bottom:2px;}
.log-q{color:var(--dim);min-width:18px;flex-shrink:0;}
.log-unknown{color:var(--c-yellow);font-style:italic;}

/* BUTTONS */
.btn-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.12s;border:1px solid var(--border2);background:var(--surface2);color:var(--text);}
.btn:hover{background:var(--surface);border-color:rgba(255,255,255,0.2);}
.btn-primary{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.16);}

/* LANDING */
.landing-eyebrow{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);margin-bottom:12px;}
.landing-title{font-family:'Syne',sans-serif;font-size:30px;font-weight:700;line-height:1.2;color:var(--text);margin-bottom:12px;}
.landing-sub{color:var(--muted);font-size:12px;max-width:500px;line-height:1.8;margin-bottom:26px;}

.tier-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:36px;}
.tier-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 11px;cursor:pointer;transition:all 0.15s;text-align:left;}
.tier-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.tc-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:5px;line-height:1;}
.tc-name{font-size:11px;color:var(--muted);margin-bottom:3px;}
.tc-desc{font-size:10px;color:var(--dim);line-height:1.5;}
.tc-0 .tc-num{color:var(--c-green);}
.tc-1 .tc-num{color:var(--c-yellow);}
.tc-2 .tc-num{color:var(--c-orange);}
.tc-3 .tc-num{color:var(--c-red);}
.tc-4 .tc-num{color:var(--c-purple);}

.start-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:rgba(45,221,150,0.1);border:1px solid var(--c-green-border);border-radius:7px;color:var(--c-green);font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.start-btn:hover{background:rgba(45,221,150,0.17);}

.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

/* TABLES */
.ref-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:18px;}
.ref-table th{text-align:left;padding:7px 11px;color:var(--dim);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:500;}
.ref-table td{padding:7px 11px;color:var(--muted);border-bottom:1px solid var(--border);vertical-align:top;line-height:1.55;}
.ref-table td:first-child{color:var(--text);font-weight:500;}
.ref-table tr:last-child td{border-bottom:none;}

/* UNKNOWN WARNING */
.unknown-note{background:rgba(245,200,66,0.07);border:1px solid rgba(245,200,66,0.2);border-radius:6px;padding:10px 14px;font-size:11px;color:var(--c-yellow);margin-bottom:16px;line-height:1.6;}

@media(max-width:768px){.sidebar{display:none;}.main{padding:22px 18px;}.tier-grid{grid-template-columns:repeat(2,1fr);}.steps-grid{grid-template-columns:1fr;}}
@media print{.sidebar{display:none;}.main{padding:20px;max-width:100%;}.opt-btn{pointer-events:none;}body{background:#fff;color:#000;}}
</style>
</head>
<body>
<div class="shell">

<nav class="sidebar">
  <div class="wordmark">// IR Decision Tool</div>
  <div class="nav-section-label">Triage</div>
  <button class="nav-item active" id="nav-triage" onclick="goHome()"><span class="nav-dot" style="background:var(--c-green)"></span>Start triage</button>
  <button class="nav-item" id="nav-decision" style="pointer-events:none;opacity:0.4"><span class="nav-dot" style="background:var(--c-yellow)"></span>Decision tree</button>
  <button class="nav-item" id="nav-outcome" style="pointer-events:none;opacity:0.4"><span class="nav-dot" style="background:var(--c-orange)"></span>Outcome</button>
  <div class="nav-section-label">Reference</div>
  <button class="nav-item" onclick="showSeverityRef()"><span class="nav-dot" style="background:var(--dim)"></span>Severity guide</button>
  <button class="nav-item" onclick="showEscRef()"><span class="nav-dot" style="background:var(--dim)"></span>Escalation matrix</button>
  <button class="nav-item" onclick="showIMTRef()"><span class="nav-dot" style="background:var(--c-blue)"></span>IMT guide</button>
  <button class="nav-item" onclick="showDFIRRef()"><span class="nav-dot" style="background:var(--c-purple)"></span>DFIR triggers</button>
  <div style="margin-top:auto;padding-top:32px">
    <div class="nav-section-label">Session</div>
    <button class="nav-item" onclick="resetAll()"><span class="nav-dot" style="background:var(--dim)"></span>Reset</button>
    <button class="nav-item" onclick="window.print()"><span class="nav-dot" style="background:var(--dim)"></span>Print / save</button>
  </div>
</nav>

<main class="main" id="main"></main>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// TREE DATA
// Each node is either a question node or an outcome node.
// question: { q, hint, opts: [{label, desc, tag, next}] }
// outcome:  { outcome:N, sev:N, title, desc, imt, dfir, immediate, notify, ircActions, escalation, docActions }
// tag: 'unknown' renders the option with dashed styling
// ─────────────────────────────────────────────────────────────
const TREE = {

  // ── ENTRY POINT ───────────────────────────────────────────
  start: {
    q: 'What is the nature of the initial detection signal?',
    hint: 'Select the category that most closely matches what triggered this triage. If the alert source is unclear or multiple signals have fired simultaneously, select the most severe applicable category.',
    opts: [
      { label: 'Alert fired — no evidence of successful access', desc: 'Firewall block, IPS deny, AV quarantine, MFA challenge failed, credential spray blocked at perimeter', next: 'blocked_entry' },
      { label: 'Suspicious or anomalous activity inside the environment', desc: 'Unusual process, recon behaviour, anomalous user activity, phishing link clicked — no confirmed breach yet', next: 'suspicious_entry' },
      { label: 'Access has been confirmed or is strongly suspected', desc: 'Verified logon from unexpected source, confirmed malware execution, EDR detects active intrusion', next: 'access_entry' },
      { label: 'Impact is already visible', desc: 'Systems encrypted, data observed exiting, services down, ransom note present', next: 'impact_entry' },
      { label: 'Unknown — alert received but nature unclear', desc: 'SIEM correlation rule fired, third-party tip, ambiguous indicators — unable to classify yet', tag: 'unknown', next: 'unknown_entry' },
    ]
  },

  // ── UNKNOWN ENTRY ─────────────────────────────────────────
  unknown_entry: {
    q: 'What can you confirm from the alert source right now?',
    hint: 'Check the raw alert, SIEM context, and EDR console before answering. Do not assume — only select what you can verify.',
    opts: [
      { label: 'I can confirm activity came from inside the network / an authenticated session', desc: 'Source IP is internal, or a valid account token was used', next: 'suspicious_entry' },
      { label: 'I can confirm only external / perimeter activity so far', desc: 'Traffic blocked at edge, no internal indicators visible yet', next: 'blocked_entry' },
      { label: 'I cannot confirm scope or origin at this stage', desc: 'Insufficient visibility — logs missing, EDR not deployed on affected host, or alert context too thin', tag: 'unknown', next: 'unknown_insufficient_vis' },
    ]
  },

  unknown_insufficient_vis: {
    outcome: 2,
    sev: 2,
    title: 'Insufficient Visibility — Treat as Active Incident',
    imt: true,
    dfir: false,
    desc: 'You cannot determine whether a breach has occurred because you lack the visibility to confirm or deny it. This is itself a risk indicator. Treat conservatively as a P2 until proven otherwise. Gaining visibility is the first objective.',
    immediate: [
      { when: 'now', steps: [
        '<strong>EDR:</strong> Identify which systems in scope have no EDR coverage — document the gap immediately',
        '<strong>SIEM:</strong> Pull all events from the alert source for T-24hrs. Look for any correlated alerts you may have missed',
        '<strong>Firewall / proxy logs:</strong> Query for unusual outbound connections or denied traffic spikes in the relevant window',
        '<strong>AD / IdP:</strong> Run a query for any account lockouts, MFA failures, or impossible travel events in last 24 hrs',
        'Do NOT attempt remediation until you understand what you are dealing with — premature action can destroy evidence',
      ]},
      { when: 'parallel', steps: [
        'Stand up a secure comms channel (out-of-band — not email if environment may be compromised)',
        'Brief security manager — P2 pending investigation, visibility gap identified',
        'Identify the asset owner for any systems in the unknown zone',
        'If visibility gap is due to missing log sources, escalate to engineering to enable urgently',
      ]},
    ],
    notify: ['Security manager — immediate', 'CISO — awareness within 2 hrs', 'Asset owners of systems in scope'],
    ircActions: ['IR analyst assigned to visibility-gain workstream', 'Document all log sources checked and their coverage status'],
    escalation: [
      { label: 'Security manager', type: 'high' },
      { label: 'CISO (2 hr)', type: 'high' },
    ],
    docActions: ['Open P2 incident ticket. Log: alert source, time of detection, log sources checked, coverage gaps, investigative actions taken'],
  },

  // ── BLOCKED ───────────────────────────────────────────────
  blocked_entry: {
    q: 'Were the blocked attempts isolated or part of a pattern?',
    hint: 'Correlate across SIEM: same source IP, same account target, same attack technique. Look back at least 7 days.',
    opts: [
      { label: 'Single isolated attempt — no pattern detected', desc: 'One event, no related alerts, no repeat activity', next: 'blocked_single' },
      { label: 'Multiple attempts — same source targeting same or multiple targets', desc: 'Credential spray, scanning, persistent external probing', next: 'blocked_persistent_target' },
      { label: 'Cannot determine — insufficient log retention or correlation', tag: 'unknown', next: 'blocked_unknown_pattern' },
    ]
  },

  blocked_unknown_pattern: {
    outcome: 1,
    sev: 1,
    title: 'Blocked — Pattern Unclear',
    imt: false,
    dfir: false,
    desc: 'You cannot determine whether this is isolated or part of a campaign due to log gaps. Treat as P3, investigate log coverage, and review again once visibility improves.',
    immediate: [
      { when: 'now', steps: [
        '<strong>SIEM:</strong> Document exactly which log sources are missing or have insufficient retention',
        '<strong>Firewall / edge:</strong> Check raw device logs directly if SIEM ingestion has gaps',
        '<strong>TI platform:</strong> Run the source IP and any domains/hashes through threat intel — known actor or scanner?',
        'Check whether the same IP has appeared in any other alert in the past 30 days',
      ]},
      { when: 'soon', steps: [
        'Tag IoC and flag for monitoring — set alert rule if source reappears',
        'Raise log coverage gap as a separate finding to the security engineering team',
        'If source is attributed to a known threat actor via TI, re-escalate to P2',
      ]},
    ],
    notify: ['Security manager — FYI'],

let path = [];

let sessionStart = Date.now();
let timerTick;
const SEV_LABELS = ['P4 — Informational','P3 — Low','P2 — Moderate','P1 — High','P0 — Critical'];
const SEV_COLORS = ['var(--c-green)','var(--c-yellow)','var(--c-orange)','var(--c-red)','var(--c-purple)'];

function elapsed() {
  const s = Math.floor((Date.now()-sessionStart)/1000);
  if(s<60) return s+'s'; if(s<3600) return Math.floor(s/60)+'m '+( s%60)+'s';
  return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';
}

function setNav(a){
  ['nav-triage','nav-decision','nav-outcome'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.classList.remove('active');
    el.style.pointerEvents='auto';el.style.opacity='1';
  });
  document.getElementById('nav-'+a)?.classList.add('active');
  if(a==='triage'){['nav-decision','nav-outcome'].forEach(id=>{const el=document.getElementById(id);if(el){el.style.opacity='0.4';el.style.pointerEvents='none';}});}
  if(a==='decision'){const el=document.getElementById('nav-outcome');if(el){el.style.opacity='0.4';el.style.pointerEvents='none';}}
}

function renderQuestion(nodeKey){
  currentNode=nodeKey;
  const node=TREE[nodeKey];
  setNav('decision');
  const m=document.getElementById('main');
  const depth=path.length;
  const pct=Math.min(Math.round((depth/7)*88),88);
  const unknownInPath=path.some(p=>p.isUnknown);

  m.innerHTML=`
    <div class="timer-badge"><span class="timer-dot"></span><span id="td">Elapsed: ${elapsed()}</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-meta"><span>Triage progress</span><span>${pct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${path.length>0?`<button class="back-btn" onclick="goBack()">← Back</button>`:''}
    ${unknownInPath?`<div class="unknown-note">⚠ One or more answers marked as unknown — outcome will be conservatively escalated until you can confirm.</div>`:''}
    <div class="q-card">
      <div class="q-number">Question ${depth+1}</div>
      <div class="q-text">${node.q}</div>
      ${node.hint?`<div class="q-hint">${node.hint}</div>`:''}
      <div class="options">
        ${node.opts.map((opt,i)=>`
          <button class="opt-btn${opt.tag==='unknown'?' opt-unknown':''}" onclick="choose(${i})">
            <span class="opt-key">${String.fromCharCode(65+i)}</span>
            <span class="opt-content">
              <div class="opt-label">${opt.label}${opt.tag==='unknown'?` <span class="opt-tag">unknown</span>`:''}</div>
              ${opt.desc?`<div class="opt-desc">${opt.desc}</div>`:''}
            </span>
            <span class="opt-arrow">→</span>
          </button>
        `).join('')}
      </div>
    </div>
    ${path.length>0?renderDecisionLog():''}
  `;
  timerTick=setInterval(()=>{const el=document.getElementById('td');if(el)el.textContent='Elapsed: '+elapsed();},1000);
}

// ─────────────────────────────────────────
// DECISION LOG
// ─────────────────────────────────────────
function renderDecisionLog(){
  if(path.length===0)return'';
  return`<div class="decision-log">
    <div class="decision-log-title">Decision log</div>
    ${path.map((p,i)=>`<div class="log-entry"><span class="log-q">Q${i+1}</span><span class="${p.isUnknown?'log-unknown':''}">${p.isUnknown?'[Unknown] ':''}${p.label}</span></div>`).join('')}
  </div>`;
}

// ─────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────
function choose(i){
  clearInterval(timerTick);
  const node=TREE[currentNode];
  const opt=node.opts[i];
  path.push({nodeKey:currentNode,choiceIndex:i,label:opt.label,isUnknown:opt.tag==='unknown'});
  const next=TREE[opt.next];
  if(next.outcome!==undefined){renderOutcome(opt.next);}
  else{renderQuestion(opt.next);}
}

function goBack(){
  clearInterval(timerTick);
  if(path.length===0){renderLanding();return;}
  const prev=path.pop();
  const node=TREE[prev.nodeKey];
  if(node.outcome!==undefined){renderOutcome(prev.nodeKey);}
  else{renderQuestion(prev.nodeKey);}
}

function startTree(){path=[];sessionStart=Date.now();renderQuestion('start');}
function goHome(){clearInterval(timerTick);path=[];currentNode='start';renderLanding();}
function resetAll(){clearInterval(timerTick);path=[];currentNode='start';sessionStart=Date.now();renderLanding();}

function showDFIRRef(){
  setNav('triage');
  document.getElementById('main').innerHTML=`
    <button class="back-btn" onclick="renderLanding()">← Back</button>
    <div class="landing-eyebrow">Reference</div>
    <h2 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px">External DFIR Engagement Guide</h2>
    <p style="color:var(--muted);font-size:12px;margin-bottom:20px;line-height:1.7">External DFIR provides specialist forensic capability, independent scope determination, and defensible evidence for regulatory or legal proceedings. Engage early — waiting degrades evidence quality and delays scope confidence.</p>
    <div class="action-section" style="margin-bottom:10px">
      <div class="action-section-header"><span class="action-section-label">Engage external DFIR when</span></div>
      <ul class="action-list">
        <li>Dwell time is confirmed or suspected &gt;4 hours — internal forensic resource alone is insufficient for scope reconstruction</li>
        <li>Dwell time is unknown — timeline reconstruction requires specialist forensics</li>
        <li>Lateral movement has occurred — multi-host forensics at scale</li>
        <li>Data exfiltration is confirmed or cannot be ruled out — data quantification requires DFIR</li>
        <li>Ransomware or destructive attack — specialist tooling and threat actor attribution</li>
        <li>Regulatory notification is likely — independent investigation provides defensible evidence</li>
        <li>Internal visibility is insufficient to confirm scope — DFIR can deploy sensors and acquire artefacts</li>
        <li>Privileged account compromise is confirmed or unconfirmed — blast radius assessment requires DFIR</li>
      </ul>
    </div>
    <div class="action-section" style="margin-bottom:10px">
      <div class="action-section-header"><span class="action-section-label">What to provide DFIR on engagement</span></div>
      <ul class="action-list">
        <li>Known timeline: first detection event, first suspected access, current state</li>
        <li>Known scope: affected systems, accounts, network segments</li>
        <li>Current containment state: what is isolated, what is still live</li>
        <li>Log sources available: SIEM coverage, EDR coverage gaps, retention periods</li>
        <li>Forensic artefacts preserved: memory images, disk images, SIEM exports</li>
        <li>Initial hypothesis: suspected access vector, actor TTPs observed</li>
        <li>Environment overview: AD topology, cloud tenants, key data repositories</li>
      </ul>
    </div>
    <div class="action-section">
      <div class="action-section-header"><span class="action-section-label">Critical: do not do this before DFIR arrives</span></div>
      <ul class="action-list">
        <li><strong>Do not reimage or wipe any compromised system</strong> — destroys forensic evidence</li>
        <li><strong>Do not restart encrypted systems</strong> — may destroy in-memory decryption artefacts</li>
        <li><strong>Do not run eradication scripts or clean-up tools</strong> — overwrites persistence mechanism evidence</li>
        <li><strong>Do not restore services into the compromised environment</strong> — risk of re-infection</li>
        <li><strong>Do not patch the initial access vector before DFIR has evidenced it</strong> — may destroy the forensic chain</li>
      </ul>
    </div>`;
}

  const i=e.key.toUpperCase().charCodeAt(0)-65;

});
