<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTI Reference Framework</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f9;--bg2:#ffffff;--bg3:#eef0f4;--bg4:#e4e8ef;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);--text:#111827;--text2:#4b5563;--text3:#9ca3af;--am:#1d6fcc;--af:#0f8a5f;--ao:#c05c1a;--ap:#7c3aed;--amd:rgba(29,111,204,0.08);--afd:rgba(15,138,95,0.08);--aod:rgba(192,92,26,0.08);--apd:rgba(124,58,237,0.08);--r:10px;--rl:16px}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}

.header{padding:24px 36px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;background:var(--bg2);position:sticky;top:0;z-index:100}
.hk{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.ht{font-size:21px;font-weight:700;letter-spacing:.04em;color:var(--text)}
.ht span{color:var(--am)}

.controls{padding:14px 36px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border)}
.sw{position:relative;flex:1;min-width:200px;max-width:380px}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.sinput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px 8px 32px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);outline:none;transition:border-color .15s}
.sinput::placeholder{color:var(--text3)}
.sinput:focus{border-color:var(--border2)}
.fbtns{display:flex;gap:5px;flex-wrap:wrap}
.fb{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px}
.fb:hover{border-color:var(--border2);color:var(--text)}
.fb.am{background:var(--amd);border-color:var(--am);color:var(--am)}
.fb.af{background:var(--afd);border-color:var(--af);color:var(--af)}
.fb.ao{background:var(--aod);border-color:var(--ao);color:var(--ao)}
.fb.ap{background:var(--apd);border-color:var(--ap);color:var(--ap)}
.fb.aa{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.18);color:var(--text)}
.fdot{width:6px;height:6px;border-radius:50%}
.rc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-left:auto;white-space:nowrap}

.main{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 118px);overflow:hidden}
.sidebar{border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2);padding:10px}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px}
.gl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);padding:10px 8px 5px}
.ci{padding:9px 11px;border-radius:7px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:all .1s;display:flex;align-items:center;gap:9px}
.ci:hover{background:var(--bg3);border-color:var(--border)}
.ci.active{background:var(--bg4);border-color:var(--border2)}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cn{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nr{padding:28px 10px;text-align:center;color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px}

.detail{overflow-y:auto;background:var(--bg)}
.detail::-webkit-scrollbar{width:3px}
.detail::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:2px}
.de{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3)}
.de p{font-family:'JetBrains Mono',monospace;font-size:11px}

.di{padding:36px 40px;max-width:960px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.di{animation:fadeUp .18s ease}

.badge{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:14px}
.dh{font-size:26px;font-weight:700;letter-spacing:.03em;line-height:1.15;margin-bottom:6px}
.df{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:16px}
.dt{font-size:15px;line-height:1.75;color:var(--text2);margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}

/* INTERACTIVE PANEL */
.ipanel{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:28px;background:var(--bg2)}
.iph{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg3);border-bottom:1px solid var(--border)}
.iph-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.iph-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3)}
.ipbody{padding:20px}

/* meta */
.mr{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:24px}
.ml{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.mv{font-size:13px;font-weight:500;color:var(--text)}
.pips{display:flex;gap:3px;align-items:center}
.pip{width:22px;height:3px;border-radius:2px;background:var(--border2)}
.pip.on{background:var(--text2)}

.divider{height:1px;background:var(--border);margin:22px 0}
.sl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.sb{font-size:13px;line-height:1.8;color:var(--text2)}

.cl{display:flex;flex-direction:column;gap:7px}
.cit{display:flex;gap:12px;align-items:flex-start;padding:11px 13px;background:var(--bg3);border-radius:7px;border:1px solid var(--border)}
.cn2{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;width:20px;height:20px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;opacity:.6}
.ct{font-size:13px;line-height:1.6;color:var(--text2)}
.ct strong{color:var(--text);font-weight:500}

.tc{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.ucg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.uc{background:var(--bg3);border-radius:7px;padding:9px 12px;font-size:12px;line-height:1.6;color:var(--text2);border-left:2px solid var(--border2)}
.tgs{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 9px;border-radius:4px;border:1px solid var(--border2);color:var(--text3);background:var(--bg3)}

/* ── INTERACTIVE COMPONENTS ── */

/* Generic clickable tiles */
.tiles{display:flex;flex-wrap:wrap;gap:8px}
.tile{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:all .12s;font-size:13px;font-weight:500}
.tile:hover{border-color:var(--border2);background:var(--bg4)}
.tile.sel{color:#fff}
.tile-desc{margin-top:14px;padding:14px 16px;background:var(--bg3);border-radius:8px;border-left:3px solid;font-size:13px;line-height:1.7;color:var(--text2);min-height:60px}
.tile-desc strong{color:var(--text);display:block;margin-bottom:4px;font-size:14px}

/* Kill chain stages */
.kc-wrap{overflow-x:auto;padding-bottom:4px}
.kc-stages{display:flex;gap:0;min-width:700px}
.kc-stage{flex:1;cursor:pointer;border:1px solid var(--border);border-right:none;transition:all .12s;padding:0}
.kc-stage:last-child{border-right:1px solid var(--border);border-radius:0 8px 8px 0}
.kc-stage:first-child{border-radius:8px 0 0 8px}
.kc-stage:hover .kcs-head{opacity:.85}
.kc-stage.sel .kcs-head{opacity:1}
.kcs-head{padding:10px 8px 8px;text-align:center;transition:all .12s}
.kcs-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.65);margin-bottom:4px}
.kcs-icon{font-size:18px;margin-bottom:4px}
.kcs-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.85);line-height:1.3}
.kc-detail{padding:14px 16px;font-size:13px;line-height:1.7;color:var(--text2);border-top:1px solid var(--border);background:var(--bg2)}
.kc-detail strong{color:var(--text);font-weight:600;display:block;margin-bottom:5px}
.kc-detect{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.kc-detect span{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;background:rgba(29,111,204,.08);border:1px solid rgba(29,111,204,.2);color:#1d6fcc}

/* ATT&CK Matrix */
.attck-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.attck-filter{font-family:'JetBrains Mono',monospace;font-size:9px;padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .1s}
.attck-filter:hover,.attck-filter.on{background:rgba(29,111,204,.08);border-color:#1d6fcc;color:#1d6fcc}
.attck-matrix{overflow-x:auto;overflow-y:visible;padding-bottom:8px}
.attck-grid{display:grid;grid-template-columns:repeat(14,1fr);gap:4px;min-width:980px}
.attck-tactic{background:rgba(15,138,95,.1);border:1px solid rgba(15,138,95,.25);border-radius:5px;padding:6px 5px 5px;text-align:center}
.attck-tactic-name{font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.04em;color:#0f8a5f;line-height:1.3;margin-bottom:2px;font-weight:500}
.attck-tactic-count{font-family:'JetBrains Mono',monospace;font-size:7px;color:rgba(15,138,95,.6)}
.attck-col{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.attck-tech{padding:5px 5px 4px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .1s;position:relative}
.attck-tech:hover{border-color:#1d6fcc;background:rgba(29,111,204,.05);z-index:10}
.attck-tech.hl{border-color:#1d6fcc;background:rgba(29,111,204,.1)}
.attck-tech-name{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--text2);line-height:1.4;word-break:break-word}
.attck-tech.hl .attck-tech-name{color:#1d6fcc}
.attck-tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#111827;color:#f9fafb;border-radius:6px;padding:8px 11px;font-family:'JetBrains Mono',monospace;font-size:9px;line-height:1.6;white-space:nowrap;z-index:100;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.attck-tech:hover .attck-tooltip{display:block}
.attck-legend{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.attck-legend span{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);display:flex;align-items:center;gap:5px}
.attck-legend-dot{width:8px;height:8px;border-radius:2px}

/* Diamond pivot */
.diamond-wrap{display:flex;gap:20px;flex-wrap:wrap}
.diamond-svg-wrap{flex:0 0 280px}
.diamond-info{flex:1;min-width:200px}
.d-node{cursor:pointer;transition:all .15s}
.d-node:hover rect,.d-node:hover circle{filter:brightness(0.92)}
.d-node.dsel rect,.d-node.dsel circle{stroke-width:2.5}
.d-panel{padding:14px;background:var(--bg3);border-radius:8px;border-left:3px solid;min-height:140px}
.d-panel h4{font-size:15px;font-weight:600;margin-bottom:6px}
.d-panel p{font-size:13px;line-height:1.7;color:var(--text2)}
.d-pivot{margin-top:12px}
.d-pivot-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.d-pivot-tags{display:flex;flex-wrap:wrap;gap:5px}
.d-pivot-tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 9px;border-radius:4px;cursor:pointer;transition:all .1s}

/* Intelligence Cycle animator */
.ic-wrap{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.ic-steps{display:flex;flex-direction:column;gap:6px;flex:0 0 200px}
.ic-step{padding:10px 13px;border-radius:7px;border:1px solid var(--border);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:10px}
.ic-step:hover{border-color:var(--border2)}
.ic-step.active{background:var(--aod);border-color:var(--ao)}
.ic-step-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;width:20px;height:20px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ao)}
.ic-step.active .ic-step-num{background:var(--ao);color:#fff;border-color:var(--ao)}
.ic-step-label{font-size:13px;font-weight:500}
.ic-step.active .ic-step-label{color:var(--ao)}
.ic-detail{flex:1;min-width:200px;padding:16px;background:var(--bg3);border-radius:8px;border-left:3px solid var(--ao)}
.ic-detail h4{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--ao)}
.ic-detail p{font-size:13px;line-height:1.75;color:var(--text2);margin-bottom:10px}
.ic-tips{display:flex;flex-direction:column;gap:5px}
.ic-tip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 9px;background:var(--bg2);border-radius:5px;border:1px solid var(--border);color:var(--text2)}
.ic-tip::before{content:'→ ';color:var(--ao)}

/* STRIDE cards */
.stride-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stride-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .12s}
.stride-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.stride-card.sel{box-shadow:0 0 0 2px currentColor}
.stride-head{padding:12px 14px;display:flex;align-items:center;gap:10px}
.stride-letter{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stride-title{font-size:14px;font-weight:600}
.stride-body{padding:0 14px 12px;font-size:12px;line-height:1.65;color:var(--text2)}
.stride-counter{font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 8px;border-radius:4px;margin-top:8px;display:inline-block}

/* TLP simulator */
.tlp-sim{display:flex;flex-direction:column;gap:8px}
.tlp-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .12s}
.tlp-row:hover{border-color:var(--border2)}
.tlp-row.sel{border-width:1.5px}
.tlp-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:4px 10px;border-radius:4px;white-space:nowrap;min-width:130px;text-align:center}
.tlp-desc{flex:1;font-size:13px;color:var(--text2);line-height:1.5}
.tlp-bar-wrap{width:120px;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;flex-shrink:0}
.tlp-bar{height:100%;border-radius:3px;transition:width .3s}
.tlp-detail{margin-top:12px;padding:14px 16px;border-radius:8px;border-left:3px solid;background:var(--bg3);font-size:13px;line-height:1.7;color:var(--text2)}
.tlp-detail strong{display:block;font-size:14px;font-weight:600;margin-bottom:5px}

/* CVSS Calculator */
.cvss-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cvss-field{display:flex;flex-direction:column;gap:6px}
.cvss-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.cvss-select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);outline:none;cursor:pointer;width:100%}
.cvss-select:focus{border-color:var(--border2)}
.cvss-result{margin-top:16px;padding:16px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.cvss-score-big{font-family:'JetBrains Mono',monospace;font-size:42px;font-weight:500;line-height:1}
.cvss-severity{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.cvss-bar-outer{flex:1;min-width:160px;height:10px;background:var(--bg4);border-radius:5px;overflow:hidden}
.cvss-bar-inner{height:100%;border-radius:5px;transition:width .4s,background .4s}
.epss-wrap{margin-top:12px;padding:12px 14px;background:rgba(29,111,204,.06);border-radius:7px;border:1px solid rgba(29,111,204,.15)}
.epss-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#1d6fcc;margin-bottom:4px}
.epss-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;color:#1d6fcc}
.epss-note{font-size:12px;color:var(--text3);margin-top:3px}

/* CAF pillars */
.caf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.caf-pillar{border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .12s}
.caf-pillar:hover{border-color:var(--border2)}
.caf-pillar.sel{border-width:1.5px}
.caf-ph{padding:10px 14px;font-size:13px;font-weight:600}
.caf-objectives{display:none;padding:0 14px 12px}
.caf-pillar.sel .caf-objectives{display:block}
.caf-obj{padding:7px 0;border-top:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;align-items:flex-start;gap:7px;line-height:1.55}
.caf-obj-id{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:1px}

/* NIST wheel */
.nist-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.nist-fn{border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .12s}
.nist-fn:hover{border-color:var(--border2);transform:translateY(-1px)}
.nist-fn.sel{box-shadow:0 0 0 2px currentColor}
.nist-fh{padding:12px 14px;display:flex;align-items:center;gap:10px}
.nist-id{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:500;width:38px;height:38px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nist-fname{font-size:14px;font-weight:600}
.nist-fnew{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;margin-left:auto;background:rgba(124,58,237,.1);color:#7c3aed;border:1px solid rgba(124,58,237,.2)}
.nist-cats{padding:0 14px 12px;display:none}
.nist-fn.sel .nist-cats{display:block}
.nist-cat{padding:6px 0;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text2);display:flex;align-items:flex-start;gap:7px;line-height:1.5}
.nist-cat-id{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;flex-shrink:0;margin-top:1px}

/* CTI CMM levels */
.cmm-levels{display:flex;flex-direction:column;gap:0}
.cmm-level{display:flex;gap:14px;align-items:stretch;padding:12px 16px;border:1px solid var(--border);border-bottom:none;cursor:pointer;transition:background .1s;position:relative}
.cmm-level:first-child{border-radius:8px 8px 0 0}
.cmm-level:last-child{border-bottom:1px solid var(--border);border-radius:0 0 8px 8px}
.cmm-level:hover{background:var(--bg3)}
.cmm-level.sel{background:var(--bg3)}
.cmm-lnum{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.cmm-lbody{flex:1}
.cmm-ltitle{font-size:14px;font-weight:600;margin-bottom:3px}
.cmm-ldesc{font-size:12px;color:var(--text2);line-height:1.6;display:none}
.cmm-level.sel .cmm-ldesc{display:block}
.cmm-bar-wrap{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;gap:3px}
.cmm-bar-pip{width:12px;height:12px;border-radius:3px;background:var(--bg4)}
.cmm-bar-pip.on{background:currentColor}

/* F3EAD */
.f3-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.f3-box{border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .12s;text-align:center}
.f3-box:hover{border-color:var(--border2);transform:translateY(-1px)}
.f3-box.sel{border-width:1.5px}
.f3-letter{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:500;line-height:1;margin-bottom:4px}
.f3-name{font-size:13px;font-weight:600;margin-bottom:6px}
.f3-desc{font-size:11px;color:var(--text2);line-height:1.6;display:none;text-align:left}
.f3-box.sel .f3-desc{display:block}
.f3-arrow{display:flex;justify-content:center;align-items:center;color:var(--text3);font-size:18px;padding:2px 0}

/* PASTA stages */
.pasta-stages{display:flex;flex-direction:column;gap:0}
.pasta-stage{display:flex;gap:14px;align-items:flex-start;padding:12px 16px;border:1px solid var(--border);border-bottom:none;cursor:pointer;transition:background .1s}
.pasta-stage:first-child{border-radius:8px 8px 0 0}
.pasta-stage:last-child{border-bottom:1px solid var(--border);border-radius:0 0 8px 8px}
.pasta-stage:hover{background:var(--bg3)}
.pasta-stage.sel{background:var(--bg3)}
.pasta-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:var(--bg4)}
.pasta-stage.sel .pasta-num{color:#fff}
.pasta-stitle{font-size:14px;font-weight:600;margin-bottom:3px}
.pasta-sdesc{font-size:12px;color:var(--text2);line-height:1.6;display:none}
.pasta-stage.sel .pasta-sdesc{display:block}
.pasta-io{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.pasta-io-box{background:var(--bg2);border-radius:5px;padding:7px 9px;border:1px solid var(--border)}
.pasta-io-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.pasta-io-val{font-size:11px;color:var(--text2)}

/* Pyramid interactive */
.pyr-wrap{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.pyr-tiers{display:flex;flex-direction:column;gap:3px;flex:0 0 auto}
.pyr-tier{cursor:pointer;transition:all .12s;border-radius:4px;border:1px solid transparent;padding:8px 14px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500}
.pyr-tier:hover{background:var(--bg3)}
.pyr-tier.sel{background:var(--bg3);border-color:var(--border2)}
.pyr-pain{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px}
.pyr-detail{flex:1;min-width:200px;padding:16px;background:var(--bg3);border-radius:8px;border-left:3px solid;min-height:180px}
.pyr-detail h4{font-size:15px;font-weight:600;margin-bottom:6px}
.pyr-detail p{font-size:13px;line-height:1.7;color:var(--text2);margin-bottom:10px}
.pyr-examples{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.pyr-ex{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;background:var(--bg2);border:1px solid var(--border)}

/* STIX object graph */
.stix-wrap{display:flex;gap:16px;flex-wrap:wrap}
.stix-objects{display:flex;flex-wrap:wrap;gap:7px;flex:1}
.stix-obj{padding:9px 13px;border-radius:7px;border:1px solid var(--border);cursor:pointer;transition:all .12s;font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px}
.stix-obj:hover{border-color:var(--border2);transform:translateY(-1px)}
.stix-obj.sel{border-width:1.5px}
.stix-type{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px}
.stix-detail{width:100%;margin-top:14px;padding:14px 16px;background:var(--bg3);border-radius:8px;border-left:3px solid;font-size:13px;line-height:1.7;color:var(--text2)}
.stix-detail h4{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text)}
.stix-rels{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.stix-rel{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 9px;border-radius:4px;background:var(--bg2);border:1px solid var(--border);color:var(--text2)}
.stix-rel::before{content:'→ ';color:#1d6fcc}

/* ACH matrix */
.ach-wrap{overflow-x:auto}
.ach-table{width:100%;border-collapse:collapse;font-size:11px}
.ach-table th{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.05em;padding:7px 8px;text-align:center;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-weight:500}
.ach-table th:first-child{text-align:left;min-width:160px}
.ach-table td{padding:6px 8px;border:1px solid var(--border);text-align:center;vertical-align:middle}
.ach-table td:first-child{text-align:left;font-size:11px;color:var(--text2);background:var(--bg3)}
.ach-c{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;margin:auto}
.ach-C{background:rgba(15,138,95,.15);color:#0f8a5f}
.ach-I{background:rgba(192,92,26,.12);color:#c05c1a}
.ach-N{background:rgba(200,80,80,.1);color:#c84b4b}
.ach-score{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:4px 8px;border-radius:4px}

/* CS&R Bill */
.csr-sectors{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.csr-sector{padding:10px 12px;border-radius:7px;border:1px solid var(--border);cursor:pointer;transition:all .12s;text-align:center}
.csr-sector:hover{border-color:var(--border2)}
.csr-sector.sel{background:rgba(29,111,204,.08);border-color:#1d6fcc}
.csr-sector-icon{font-size:20px;margin-bottom:4px}
.csr-sector-name{font-size:13px;font-weight:500}
.csr-obligations{display:flex;flex-direction:column;gap:7px}
.csr-ob{padding:10px 14px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);font-size:12px;line-height:1.6;color:var(--text2);display:flex;gap:10px;align-items:flex-start}
.csr-ob-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.csr-ob strong{display:block;color:var(--text);font-size:13px;font-weight:600;margin-bottom:2px}

/* MISP components */
.misp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.misp-comp{border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .12s}
.misp-comp:hover{border-color:var(--border2)}
.misp-comp.sel{border-color:#0f8a5f;background:rgba(15,138,95,.05)}
.misp-comp-title{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.misp-comp-icon{font-size:16px}
.misp-comp-desc{font-size:12px;color:var(--text2);line-height:1.6;display:none}
.misp-comp.sel .misp-comp-desc{display:block}
.misp-example{margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:9px;padding:5px 8px;background:var(--bg3);border-radius:4px;color:var(--text3);border:1px solid var(--border);display:none}
.misp-comp.sel .misp-example{display:block}

@media(max-width:768px){.main{grid-template-columns:1fr;height:auto}.sidebar{height:260px}.tc,.ucg,.caf-grid,.nist-grid,.f3-grid,.stride-grid,.cvss-grid,.csr-sectors,.misp-grid,.pasta-io{grid-template-columns:1fr}.di{padding:22px 18px}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="hk">Threat Intelligence</div>
    <div class="ht"><span>CTI</span> Reference Framework</div>
  </div>
</div>

<div class="controls">
  <div class="sw">
    <span class="si">⌕</span>
    <input class="sinput" type="text" id="search" placeholder="Search frameworks, tactics, tags..." autocomplete="off">
  </div>
  <div class="fbtns">
    <button class="fb aa" data-cat="all" onclick="setFilter('all',this)"><span class="fdot" style="background:#888"></span>All</button>
    <button class="fb" data-cat="model" onclick="setFilter('model',this)"><span class="fdot" style="background:var(--am)"></span>Models</button>
    <button class="fb" data-cat="framework" onclick="setFilter('framework',this)"><span class="fdot" style="background:var(--af)"></span>Frameworks</button>
    <button class="fb" data-cat="methodology" onclick="setFilter('methodology',this)"><span class="fdot" style="background:var(--ao)"></span>Methodologies</button>
    <button class="fb" data-cat="maturity" onclick="setFilter('maturity',this)"><span class="fdot" style="background:var(--ap)"></span>Maturity &amp; Sharing</button>
  </div>
  <div class="rc" id="rc">18 entries</div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="detail" id="detail">
    <div class="de">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none"><rect x="6" y="6" width="32" height="32" rx="4" stroke="#9ca3af" stroke-width="1.5"/><line x1="13" y1="15" x2="31" y2="15" stroke="#9ca3af" stroke-width="1.5"/><line x1="13" y1="22" x2="27" y2="22" stroke="#9ca3af" stroke-width="1.5"/><line x1="13" y1="29" x2="22" y2="29" stroke="#9ca3af" stroke-width="1.5"/></svg>
      <p>Select an entry to explore</p>
    </div>
  </div>
</div>

<script>
const CC={model:'var(--am)',framework:'var(--af)',methodology:'var(--ao)',maturity:'var(--ap)'};
const CD={model:'var(--amd)',framework:'var(--afd)',methodology:'var(--aod)',maturity:'var(--apd)'};
const CL={model:'Model',framework:'Framework',methodology:'Methodology',maturity:'Maturity & Sharing'};

/* ══════════════════════════════════════════════
   INTERACTIVE PANEL GENERATORS
══════════════════════════════════════════════ */

function ipanel(title, sub, body) {
  return `<div class="ipanel"><div class="iph"><span class="iph-title">${title}</span><span class="iph-sub">${sub}</span></div><div class="ipbody">${body}</div></div>`;
}

/* ─ DIAMOND MODEL ─ */
function iDiamond() {
  const nodes = [
    {id:'adv', label:'ADVERSARY', sub:'Who is attacking?', col:'#1d6fcc', desc:'The operator or director of the intrusion. Can be a nation-state, criminal group, or insider. Attribution starts here — pivoting from capability or infrastructure can reveal identity.',pivot:'Pivot to: capability they use, campaigns they run, victims they target'},
    {id:'cap', label:'CAPABILITY', sub:'How are they attacking?', col:'#c05c1a', desc:'Tools, malware, exploits, and techniques employed. The same capability across incidents can fingerprint a threat actor even when infrastructure rotates. Links to MITRE ATT&CK TTPs.',pivot:'Pivot to: other adversaries using same tools, other victims targeted with same capability'},
    {id:'infra', label:'INFRASTRUCTURE', sub:'What are they using?', col:'#0f8a5f', desc:'Physical or logical resources: C2 servers, IP addresses, domains, cloud accounts. Infrastructure often reused or shared between campaigns — a high-value pivot point for hunting.',pivot:'Pivot to: other adversaries on same infra, other campaigns using same C2'},
    {id:'vic', label:'VICTIM', sub:'Who is being targeted?', col:'#7c3aed', desc:'Target organisation, person, or asset. Understanding victim profile (sector, geography, data held) helps predict future targets and prioritise defensive investments.',pivot:'Pivot to: other victims in same sector, adversaries known to target this industry'},
  ];
  let sel = 'adv';
  const n = nodes.find(x=>x.id===sel);
  return `
<div class="diamond-wrap" id="dw">
<div class="diamond-svg-wrap">
<svg viewBox="0 0 280 220" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%">
  <polygon points="140,18 258,110 140,202 22,110" fill="rgba(29,111,204,0.04)" stroke="rgba(29,111,204,0.2)" stroke-width="1.5"/>
  <line x1="22" y1="110" x2="258" y2="110" stroke="rgba(0,0,0,0.06)" stroke-dasharray="4,4"/>
  <line x1="140" y1="18" x2="140" y2="202" stroke="rgba(0,0,0,0.06)" stroke-dasharray="4,4"/>
  <g class="d-node" id="dn-adv" onclick="dSel('adv')" style="cursor:pointer">
    <circle cx="140" cy="18" r="26" fill="#f0f5ff" stroke="#1d6fcc" stroke-width="1.5" id="dc-adv"/>
    <text x="140" y="13" text-anchor="middle" fill="#1d6fcc" font-family="JetBrains Mono" font-size="7" font-weight="500">ADVERSARY</text>
    <text x="140" y="24" text-anchor="middle" fill="rgba(29,111,204,0.6)" font-family="JetBrains Mono" font-size="7">Who</text>
  </g>
  <g class="d-node" id="dn-vic" onclick="dSel('vic')" style="cursor:pointer">
    <circle cx="140" cy="202" r="26" fill="#f5f0ff" stroke="#7c3aed" stroke-width="1.5" id="dc-vic"/>
    <text x="140" y="197" text-anchor="middle" fill="#7c3aed" font-family="JetBrains Mono" font-size="7" font-weight="500">VICTIM</text>
    <text x="140" y="208" text-anchor="middle" fill="rgba(124,58,237,0.6)" font-family="JetBrains Mono" font-size="7">Target</text>
  </g>
  <g class="d-node" id="dn-cap" onclick="dSel('cap')" style="cursor:pointer">
    <circle cx="22" cy="110" r="26" fill="#fff8f0" stroke="#c05c1a" stroke-width="1.5" id="dc-cap"/>
    <text x="22" y="106" text-anchor="middle" fill="#c05c1a" font-family="JetBrains Mono" font-size="7" font-weight="500">CAPABILITY</text>
    <text x="22" y="116" text-anchor="middle" fill="rgba(192,92,26,0.6)" font-family="JetBrains Mono" font-size="7">Tools/TTPs</text>
  </g>
  <g class="d-node" id="dn-infra" onclick="dSel('infra')" style="cursor:pointer">
    <circle cx="258" cy="110" r="26" fill="#f0faf5" stroke="#0f8a5f" stroke-width="1.5" id="dc-infra"/>
    <text x="258" y="106" text-anchor="middle" fill="#0f8a5f" font-family="JetBrains Mono" font-size="7" font-weight="500">INFRA</text>
    <text x="258" y="116" text-anchor="middle" fill="rgba(15,138,95,0.6)" font-family="JetBrains Mono" font-size="7">C2/IPs</text>
  </g>
  <text x="80" y="58" text-anchor="middle" fill="rgba(0,0,0,0.2)" font-family="JetBrains Mono" font-size="8">uses</text>
  <text x="200" y="58" text-anchor="middle" fill="rgba(0,0,0,0.2)" font-family="JetBrains Mono" font-size="8">targets via</text>
  <text x="80" y="170" text-anchor="middle" fill="rgba(0,0,0,0.2)" font-family="JetBrains Mono" font-size="8">against</text>
  <text x="200" y="170" text-anchor="middle" fill="rgba(0,0,0,0.2)" font-family="JetBrains Mono" font-size="8">over</text>
</svg>
</div>
<div class="diamond-info" id="diamond-info">
  <div class="d-panel" id="d-panel" style="border-left-color:${n.col}">
    <h4 style="color:${n.col}">${n.label}</h4>
    <p>${n.desc}</p>
    <div class="d-pivot">
      <div class="d-pivot-label">Analyst Pivot</div>
      <div class="d-pivot-tags" id="d-pivot-tags">
        ${n.pivot.split(', ').map(p=>`<span class="d-pivot-tag" style="background:rgba(29,111,204,0.08);border:1px solid rgba(29,111,204,0.2);color:#1d6fcc">${p}</span>`).join('')}
      </div>
    </div>
  </div>
</div>
</div>`;
}

/* ─ KILL CHAIN ─ */
function iKillChain() {
  const stages = [
    {num:1,icon:'🔍',label:'Recon',col:'#1e3a5f',desc:'Passive and active reconnaissance to identify targets, technologies, and personnel. Includes OSINT, LinkedIn profiling, DNS enumeration, and network scanning.',detect:['OSINT monitoring','Brand/domain alerting','Dark web monitoring'],disrupt:'Counter-recon: limit public exposure, honeypot email addresses, limit DNS info'},
    {num:2,icon:'⚗️',label:'Weaponise',col:'#1d4e7a',desc:'Building a deliverable weapon — pairing an exploit with a backdoor payload. Typically occurs entirely offline; defenders have no visibility at this stage.',detect:['Threat intel feeds','Malware sandbox (post-delivery)'],disrupt:'Focus: identify adversary toolsets via CTI, track malware families'},
    {num:3,icon:'📨',label:'Deliver',col:'#1a6491',desc:'Transmitting the weaponised payload to the target environment via phishing email, malicious link, USB drop, or supply chain compromise.',detect:['Email gateway','Web proxy','USB controls','Phishing simulation'],disrupt:'Email filtering, user awareness, sandboxing, web filtering'},
    {num:4,icon:'💥',label:'Exploit',col:'#157a9e',desc:'Triggering the payload against a vulnerability in software, hardware, or the user. Can be client-side (user opens document) or server-side (remote code execution).',detect:['EDR/AV','HIPS','Patch telemetry','IDS signatures'],disrupt:'Patch management, application whitelisting, exploit mitigations (ASLR, DEP)'},
    {num:5,icon:'📌',label:'Install',col:'#0f8a5f',desc:'Installing a persistent backdoor, scheduled task, registry run key, or service to maintain access beyond the initial exploitation event.',detect:['EDR persistence detection','Registry monitoring','File integrity monitoring'],disrupt:'Application control, privileged access management, FIM alerts'},
    {num:6,icon:'📡',label:'C2',col:'#7c3aed',desc:'Establishing a command-and-control channel to remotely operate the implant. Often uses encrypted HTTPS, DNS tunnelling, or legitimate cloud services to blend in.',detect:['DNS anomaly detection','Beaconing detection','NGFW/proxy logs','Network flow analysis'],disrupt:'DNS sinkholes, proxy inspection, threat intel blocking, network segmentation'},
    {num:7,icon:'🎯',label:'Actions',col:'#c05c1a',desc:'Achieving the mission objective: data exfiltration, ransomware deployment, destructive action, or establishing long-term persistence for future operations.',detect:['DLP','UEBA','Large outbound transfers','Ransomware detection'],disrupt:'Data classification, backup integrity, least privilege, incident response readiness'},
  ];
  let sel = 0;
  window.kcStages = stages;
  return `
<div>
<div class="kc-wrap"><div class="kc-stages" id="kc-stages">
${stages.map((s,i)=>`<div class="kc-stage${i===0?' sel':''}" onclick="kcSel(${i})" style="background:${i===0?s.col:'#f4f6f9'}">
  <div class="kcs-head" style="background:${s.col}">
    <div class="kcs-num">${s.num}</div>
    <div class="kcs-icon">${s.icon}</div>
    <div class="kcs-label">${s.label}</div>
  </div>
</div>`).join('')}
</div></div>
<div class="kc-detail" id="kc-detail">
  <strong>${stages[0].label}</strong>
  ${stages[0].desc}
  <div class="kc-detect">${stages[0].detect.map(d=>`<span>${d}</span>`).join('')}</div>
  <div style="margin-top:10px;font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">↯ ${stages[0].disrupt}</div>
</div>
</div>`;
}

/* ─ PYRAMID OF PAIN ─ */
function iPyramid() {
  const tiers = [
    {label:'TTPs',pain:'TOUGH',col:'#7c3aed',w:'100%',desc:'Tactics, Techniques & Procedures — the adversary\'s fundamental approach and behaviour patterns. Denying TTPs forces complete retooling: new malware, new infrastructure, new procedures. Maximum disruption.',examples:['Spearphishing with macro-enabled docs','Living-off-the-land techniques','Pass-the-hash lateral movement','LSASS credential dumping'],action:'Map to MITRE ATT&CK. Build behavioural detections in SIEM/EDR. Focus threat hunting on technique signatures.'},
    {label:'Host Artefacts',pain:'ANNOYING',col:'#1d6fcc',w:'83%',desc:'Registry keys, file paths, mutex names, service names, scheduled task names. Changing these requires the adversary to rebuild and retest tooling — significant but not insurmountable effort.',examples:['HKCU\\Software\\malware-name','C:\\ProgramData\\update.exe','ServiceName: svchost32','Mutex: {GUID}'],action:'Deploy file integrity monitoring and registry auditing. Use YARA rules for host artefact patterns.'},
    {label:'Network Artefacts',pain:'ANNOYING',col:'#0f8a5f',w:'67%',desc:'URI patterns, HTTP User-Agent strings, C2 callback intervals, packet headers. Disrupting these requires the adversary to modify their framework configuration and retest.',examples:['User-Agent: Mozilla/5.0 (custom)','Beacon interval: 300s ± 10%','URI: /api/v2/update?id=','TLS JA3 fingerprint'],action:'Implement network traffic analysis (NTA), proxy logging with user-agent inspection, JA3/JA3S fingerprinting.'},
    {label:'Domain Names',pain:'SIMPLE',col:'#c05c1a',w:'50%',desc:'Command-and-control domains. Easily replaced via new domain registration, fast-flux DNS, or abuse of legitimate cloud services, but still requires time and operational effort.',examples:['update-service[.]net','cdn-delivery[.]com','api.legitimate-cloud[.]io','DGA-generated domains'],action:'DNS RPZ (Response Policy Zones), threat intel DNS feeds, passive DNS monitoring, sinkholing.'},
    {label:'IP Addresses',pain:'EASY',col:'#d97706',w:'37%',desc:'C2 server IP addresses. Trivially rotated by the adversary — new VPS, new cloud instance, bulletproof hosting, or residential proxies. Blocking individual IPs is low-value for persistent adversaries.',examples:['45.155.x.x (bulletproof hosting)','Residential proxy rotations','Cloud provider exit IPs','Tor exit nodes'],action:'Still worth blocking for opportunistic threats. Use IP reputation feeds. Do not rely on this alone for APT tracking.'},
    {label:'Hash Values',pain:'TRIVIAL',col:'#dc2626',w:'23%',desc:'MD5, SHA1, SHA256 file hashes. Absolutely trivial to change — a single byte modification produces a new hash. Useful for point-in-time identification but provides near-zero predictive detection value.',examples:['SHA256: a1b2c3d4...','MD5: 098f6bcd...'],action:'Record hashes in SIEM for historical reference. Do not rely on hashes as primary detection. One compile = new hash.'},
  ];
  window.pyrTiers = tiers;
  return `
<div class="pyr-wrap" id="pyr-wrap">
<div class="pyr-tiers">
${tiers.map((t,i)=>`<div class="pyr-tier${i===0?' sel':''}" onclick="pyrSel(${i})" style="${i===0?'background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.2)':''}">
  <div style="width:${t.w};max-width:180px;height:10px;border-radius:3px;background:${t.col};opacity:${0.3+i*0.12};flex-shrink:0"></div>
  <span style="font-size:13px;font-weight:500">${t.label}</span>
  <span class="pyr-pain" style="background:${t.col}1a;color:${t.col};border:1px solid ${t.col}33;margin-left:auto">${t.pain}</span>
</div>`).join('')}

  const matrix = [

    ['C','I','N','N'],

  return `

<div style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.7">Analysis of Competing Hypotheses (ACH) — click cells to toggle Consistent (✓), Inconsistent (~), or N/A (✗) and observe which hypothesis has fewest inconsistencies.</div>

</tr>`).join('')}
</tbody>
<tfoot><tr>
  <td style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3)">Inconsistency score ↓</td>

</table>
</div>
<div style="margin-top:12px;display:flex;gap:12px;font-family:'JetBrains Mono',monospace;font-size:10px;flex-wrap:wrap">

let activeFilter='all', searchQuery='', activeId=null;

function matches(item,q){
  if(!q) return true;
  const hay=[item.name,item.full,item.tagline,item.description,...item.tags,...item.usecases,item.origin].join(' ').toLowerCase();
  return q.toLowerCase().split(' ').every(w=>hay.includes(w));
}
function filtered(){return DATA.filter(d=>(activeFilter==='all'||d.cat===activeFilter)&&matches(d,searchQuery));}

function setFilter(cat,btn){
  activeFilter=cat;
  document.querySelectorAll('.fb').forEach(b=>{b.className='fb';});
  btn.className='fb '+(cat==='all'?'aa':cat==='model'?'am':cat==='framework'?'af':cat==='methodology'?'ao':'ap');
  renderSidebar();
}

function renderSidebar(){
  const items=filtered();
  document.getElementById('rc').textContent=items.length+' entr'+(items.length===1?'y':'ies');
  const sb=document.getElementById('sidebar');
  if(!items.length){sb.innerHTML='<div class="nr">No results</div>';return;}
  const groups={};
  items.forEach(d=>{if(!groups[d.cat])groups[d.cat]=[];groups[d.cat].push(d);});
  let html='';
  ['model','framework','methodology','maturity'].forEach(cat=>{
    if(!groups[cat]) return;
    html+=`<div class="gl">${CL[cat]}s</div>`;
    groups[cat].forEach(d=>{
      html+=`<div class="ci${d.id===activeId?' active':''}" onclick="selectItem('${d.id}')">
        <div class="cdot" style="background:${CC[d.cat]}"></div>
        <div><div class="cn">${d.name}</div><div class="cs">${d.origin.split('—')[0].trim()}</div></div>
      </div>`;
    });
  });
  sb.innerHTML=html;
}

function cvssCalc(){
  const av=parseFloat(document.getElementById('cv-av').value);
  const ac=parseFloat(document.getElementById('cv-ac').value);
  const pr=parseFloat(document.getElementById('cv-pr').value);
  const ui=parseFloat(document.getElementById('cv-ui').value);
  const c=parseFloat(document.getElementById('cv-c').value);
  const ii=parseFloat(document.getElementById('cv-i').value);
  const a=parseFloat(document.getElementById('cv-a').value);
  const epss=parseInt(document.getElementById('cv-epss').value);
  const iss=1-(1-c)*(1-ii)*(1-a);
  const impact=iss<=0?0:6.42*iss;
  const exploit=8.22*av*ac*pr*ui;
  let score=impact<=0?0:Math.min(10,(impact+exploit)*1.08);
  score=Math.round(score*10)/10;
  let sev,scol;
  if(score>=9.0){sev='CRITICAL';scol='#dc2626';}
  else if(score>=7.0){sev='HIGH';scol='#c05c1a';}
  else if(score>=4.0){sev='MEDIUM';scol='#d97706';}
  else if(score>0){sev='LOW';scol='#0f8a5f';}
  else{sev='NONE';scol='#9ca3af';}
  document.getElementById('cvss-score-num').textContent=score.toFixed(1);
  document.getElementById('cvss-score-num').style.color=scol;
  document.getElementById('cvss-sev').textContent=sev;
  document.getElementById('cvss-sev').style.color=scol;
  document.getElementById('cvss-bar').style.width=(score*10)+'%';
  document.getElementById('cvss-bar').style.background=scol;
  document.getElementById('epss-val').textContent=epss+'%';
  const enote=epss>=50?'High exploitation likelihood — patch urgently':epss>=20?'Moderate exploitation likelihood — monitor actively':'Low exploitation likelihood — standard patching cycle';
  document.getElementById('epss-note').textContent=enote;
  let urgency,urgnote,urgcol;
  if(score>=9&&epss>=30){urgency='IMMEDIATE';urgnote='Critical CVSS + active exploitation — emergency patch within 24h.';urgcol='#dc2626';}
  else if(score>=7&&epss>=20){urgency='URGENT';urgnote='High severity with meaningful exploitation — patch within 72h.';urgcol='#c05c1a';}
  else if(score>=7||epss>=50){urgency='HIGH';urgnote='High severity or active exploitation — patch within 7 days.';urgcol='#d97706';}
  else if(score>=4){urgency='MEDIUM';urgnote='Standard vulnerability management cycle — patch within 30 days.';urgcol='#b45309';}
  else{urgency='LOW';urgnote='Low risk — include in next maintenance cycle.';urgcol='#0f8a5f';}
  document.getElementById('cvss-verdict').innerHTML='<strong style="color:'+urgcol+';display:block;margin-bottom:4px">Patch Urgency: '+urgency+'</strong>'+urgnote;
  document.getElementById('cvss-verdict').style.background=urgcol+'09';
  document.getElementById('cvss-verdict').style.borderColor=urgcol+'25';
}

  document.querySelectorAll('.csr-sector').forEach((el,j)=>el.classList.toggle('sel',j===i));
  const s=csrSectors[i];
  document.getElementById('csr-sector-note').innerHTML='<strong style="color:'+s.col+'">'+s.name+' sector context:</strong> '+s.note;
  document.getElementById('csr-sector-note').style.borderLeftColor=s.col;
  document.getElementById('csr-sector-note').style.background=s.col+'09';
}

const navTechCounts=[10,8,9,12,18,13,22,14,26,9,17,16,9,14];
function navRender(actorIdx){
  navActors.forEach((a,i)=>{
    const btns=document.querySelectorAll('.attck-filter');
    if(btns[i]) btns[i].classList.toggle('on',i===actorIdx);
  });
  const a=navActors[actorIdx];
  a.coverage.forEach((cov,col)=>{
    const el=document.getElementById('nav-col-'+col);
    const count=navTechCounts[col];
    let html='';
    for(let r=0;r<Math.min(count,8);r++){
      const intensity=r<cov?Math.min(1,0.15+r*0.15):0.04;
      html+='<div style="height:14px;border-radius:2px;border:1px solid rgba(29,111,204,'+(r<cov?'0.3':'0.08')+');background:rgba(29,111,204,'+intensity+');cursor:pointer" title="'+(r<cov?'Technique covered by '+a.name:'No coverage')+'"></div>';
    }
    if(count>8) html+='<div style="font-family:JetBrains Mono,monospace;font-size:7px;color:var(--text3);padding:2px 0">+'+( count-8)+'</div>';
    el.innerHTML=html;
  });
}
function navActor(i,btn){navRender(i);}
navRender(0);

// ── Panel handler init ──
if(typeof cvssCalc==='function') cvssCalc();
if(typeof navRender==='function') navRender(0);
if(typeof achUpdateScores==='function') achUpdateScores();
</script>
